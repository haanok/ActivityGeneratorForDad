function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => { if (open) clampToViewport(); }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, startRight = window.innerWidth - r.right;
    const sy = e.clientY, startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = { x: startRight - (ev.clientX - sx), y: startBottom - (ev.clientY - sy) };
      clampToViewport();
    };
    const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" onClick={() => setOpen(false)}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label, children }) {
  return <><div className="twk-sect">{label}</div>{children}</>;
}

function TweakRow({ label, children }) {
  return <div className="twk-row"><div className="twk-lbl"><span>{label}</span></div>{children}</div>;
}

function TweakRadio({ label, value, options, onChange }) {
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const maxLen = opts.reduce((m, o) => Math.max(m, String(o.label).length), 0);
  const n = opts.length;
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[n] ?? 0);

  if (!fitsAsSegments) {
    return (
      <TweakRow label={label}>
        <select className="twk-field" value={value} onChange={(e) => {
          const m = opts.find((o) => String(o.value) === e.target.value);
          onChange(m ? m.value : e.target.value);
        }}>
          {opts.map((o) => <option key={o.value} value={o.value}>{o.label}</option>)}
        </select>
      </TweakRow>
    );
  }

  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const i = Math.floor(((clientX - r.left - 2) / (r.width - 4)) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => { if (trackRef.current) { const v = segAt(ev.clientX); if (v !== valueRef.current) onChange(v); } };
    const up = () => { setDragging(false); window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <style>{`.twk-seg-thumb{transition:left .15s cubic-bezier(.3,.7,.4,1),width .15s}.twk-seg.dragging .twk-seg-thumb{transition:none}`}</style>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`, width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>{o.label}</button>
        ))}
      </div>
    </TweakRow>
  );
}


// ── Design constants ──────────────────────────────────────────────────────────

const PALETTES = {
  cream:  { paper: '#FAF3E0', ink: '#3A2F23', muted: '#8A7256', accent: '#C9A86B' },
  blush:  { paper: '#FBEFE6', ink: '#4A2A1C', muted: '#A07060', accent: '#D88A6C' },
  mint:   { paper: '#EDF4E8', ink: '#27392A', muted: '#6F8870', accent: '#7DA88A' },
  sky:    { paper: '#E8EFF5', ink: '#1F2E3D', muted: '#5E7488', accent: '#7B9FBD' },
  butter: { paper: '#FBF3D4', ink: '#3D2F0A', muted: '#8A7430', accent: '#D9B656' },
};

const CAT_COLORS = {
  walk:   { bg: '#E8F0DC', ink: '#4A6B3A', tape: '#A8C49A' },
  play:   { bg: '#FBE2DA', ink: '#8A4030', tape: '#F4B5A8' },
  puzzle: { bg: '#FAEBC5', ink: '#7A5A1A', tape: '#E8C36A' },
  read:   { bg: '#DDE7F0', ink: '#365070', tape: '#A8C3D8' },
};

const DRAMA = {
  subtle:  { chip: 1.5, card: -0.4, bounce: 1.10, shadow: 2 },
  playful: { chip: 3,   card: -1,   bounce: 1.25, shadow: 3 },
  wild:    { chip: 6,   card: -2.5, bounce: 1.45, shadow: 4 },
};

const TITLE_FONTS = {
  bagel:   { family: '"Bagel Fat One", serif',  weight: 400, sizeHero: 46, sizeCard: 26 },
  lobster: { family: '"Lobster", cursive',       weight: 400, sizeHero: 50, sizeCard: 28 },
  fredoka: { family: '"Fredoka", system-ui',     weight: 700, sizeHero: 48, sizeCard: 27 },
};

function getDayOnLeave() {
  const KEY = 'dad-leave-start';
  let stored = null;
  try { stored = localStorage.getItem(KEY); } catch {}
  if (!stored) {
    const today = new Date().toISOString().slice(0, 10);
    try { localStorage.setItem(KEY, today); } catch {}
    return 1;
  }
  const start = new Date(stored), now = new Date();
  start.setHours(0, 0, 0, 0); now.setHours(0, 0, 0, 0);
  return Math.max(1, Math.floor((now - start) / 86400000) + 1);
}


// ── Shared sub-components ─────────────────────────────────────────────────────

function Icon({ cat, style, size = 32, lang }) {
  const data = ACTIVITIES[lang][cat];
  if (style === 'emoji') {
    return <span style={{ fontSize: size, lineHeight: 1, display: 'inline-flex' }}>{data.emoji}</span>;
  }
  const letter = { walk: 'W', play: 'P', puzzle: 'Z', read: 'R' }[cat];
  const color = { walk: '#A8C49A', play: '#F4B5A8', puzzle: '#E8C36A', read: '#A8C3D8' }[cat];
  if (style === 'letter') {
    return (
      <div style={{
        width: size, height: size, borderRadius: '50%', background: color,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        fontFamily: '"Bagel Fat One", serif', fontSize: size * 0.55, color: '#fff',
        boxShadow: '0 2px 0 rgba(0,0,0,0.12)',
      }}>{letter}</div>
    );
  }
  const shape = {
    walk:   <circle cx="16" cy="16" r="13" fill={color}/>,
    play:   <polygon points="16,3 29,28 3,28" fill={color}/>,
    puzzle: <rect x="3" y="3" width="26" height="26" rx="3" fill={color}/>,
    read:   <polygon points="16,2 30,16 16,30 2,16" fill={color}/>,
  }[cat];
  return (
    <svg width={size} height={size} viewBox="0 0 32 32" style={{ filter: 'drop-shadow(0 2px 0 rgba(0,0,0,0.12))' }}>
      {shape}
    </svg>
  );
}

function Squiggle({ color = '#C9A86B', style = {} }) {
  return (
    <svg width="60" height="20" viewBox="0 0 60 20" style={style}>
      <path d="M2 10 Q 10 2, 18 10 T 34 10 T 50 10 T 58 10"
        stroke={color} strokeWidth="2" fill="none" strokeLinecap="round"/>
    </svg>
  );
}

function LangSwitcher({ lang, palette, onChange }) {
  const opts = [
    { code: 'no', flag: '🇳🇴', label: 'NO' },
    { code: 'en', flag: '🇬🇧', label: 'EN' },
  ];
  return (
    <div style={{ display: 'flex', gap: 4 }}>
      {opts.map(({ code, flag, label }) => {
        const active = lang === code;
        return (
          <button key={code} onClick={() => onChange(code)}
            title={code === 'no' ? 'Norsk' : 'English'}
            style={{
              display: 'flex', alignItems: 'center', gap: 4,
              padding: '2px 8px',
              background: active ? palette.ink : 'transparent',
              color: active ? palette.paper : palette.muted,
              border: `1.5px solid ${active ? palette.ink : palette.ink + '44'}`,
              borderRadius: 999,
              fontFamily: '"Nunito"', fontWeight: 800, fontSize: 11,
              transition: 'all .15s',
              lineHeight: 1.6,
            }}>
            <span style={{ fontSize: 13 }}>{flag}</span>
            {label}
          </button>
        );
      })}
    </div>
  );
}

function ActivityCard({ cat, item, palette, C, rotation, drama, titleFont, iconStyle, lang, seedKey }) {
  const s = STRINGS[lang];
  return (
    <div key={seedKey} style={{
      position: 'relative',
      background: '#FFFCF4',
      borderRadius: 14,
      padding: '30px 22px 24px',
      transform: `rotate(${rotation}deg)`,
      boxShadow: `0 6px 0 rgba(58,47,35,0.08), 0 22px 36px -10px rgba(58,47,35,0.22)`,
      border: '1px solid rgba(58,47,35,0.1)',
      animation: 'sbFlop 0.5s cubic-bezier(.3,1.4,.5,1)',
    }}>
      {/* washi tape */}
      <div style={{
        position: 'absolute', top: -12, left: '50%',
        transform: 'translateX(-50%) rotate(-4deg)',
        width: 90, height: 26, background: C.tape, opacity: 0.88,
        backgroundImage: 'repeating-linear-gradient(45deg, transparent 0 4px, rgba(255,255,255,0.28) 4px 8px)',
        borderRadius: 2, boxShadow: '0 1px 2px rgba(0,0,0,0.08)',
      }}/>
      {/* corner doodle */}
      <svg width="28" height="28" viewBox="0 0 28 28" style={{ position: 'absolute', top: 10, right: 10, opacity: 0.55 }}>
        <path d="M4 14 Q 4 4, 14 4 T 24 14" stroke={C.ink} strokeWidth="1.5" fill="none" strokeLinecap="round"/>
        <circle cx="14" cy="14" r="2.5" fill={C.ink}/>
      </svg>

      <div style={{
        display: 'inline-flex', alignItems: 'center', gap: 6,
        padding: '4px 10px', background: C.bg, borderRadius: 999, marginBottom: 14,
        fontFamily: '"Nunito"', fontWeight: 800, fontSize: 11,
        textTransform: 'uppercase', letterSpacing: 0.8, color: C.ink,
      }}>
        <Icon cat={cat} style={iconStyle} size={14} lang={lang}/>
        {ACTIVITIES[lang][cat].label}
      </div>

      <div style={{
        fontFamily: titleFont.family, fontWeight: titleFont.weight,
        fontSize: titleFont.sizeCard, lineHeight: 1.05,
        color: palette.ink, marginBottom: 10, letterSpacing: -0.2,
      }}>{item.title}</div>

      <div style={{
        fontFamily: '"Nunito"', fontSize: 15, lineHeight: 1.55,
        color: palette.muted, marginBottom: 16,
      }}>{item.description}</div>

      <div style={{
        display: 'flex', alignItems: 'center', gap: 6,
        fontFamily: '"Caveat", cursive', fontSize: 19,
        color: C.ink, transform: 'rotate(-1deg)', transformOrigin: 'left',
      }}>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="9" stroke={C.ink} strokeWidth="2"/>
          <path d="M12 7v5l3 2" stroke={C.ink} strokeWidth="2" strokeLinecap="round"/>
        </svg>
        {s.about} {item.duration}
      </div>
    </div>
  );
}

function EmptyState({ palette, C, cat, iconStyle, lang }) {
  const s = STRINGS[lang];
  return (
    <div style={{
      position: 'relative',
      background: 'rgba(255,252,244,0.55)',
      border: `2px dashed ${palette.ink}55`,
      borderRadius: 14, padding: '28px 22px 26px', textAlign: 'center',
    }}>
      <div style={{
        fontSize: 42, lineHeight: 1, marginBottom: 12,
        transform: 'rotate(-4deg)', display: 'inline-block',
        filter: 'drop-shadow(0 3px 0 rgba(58,47,35,0.08))',
      }}>
        <Icon cat={cat} style={iconStyle} size={48} lang={lang}/>
      </div>
      <div style={{
        fontFamily: '"Caveat", cursive', fontSize: 22,
        color: palette.muted, lineHeight: 1.2, transform: 'rotate(-1deg)',
      }}>{s.emptyLine1}<br/>{s.emptyLine2}</div>
      <svg width="36" height="46" viewBox="0 0 36 46" style={{

      }}>
        <path d="M18 44 C 18 30, 6 22, 6 8" stroke={palette.muted} strokeWidth="2" fill="none" strokeLinecap="round" strokeDasharray="3 4"/>
        <path d="M2 12 L 6 4 L 12 10" stroke={palette.muted} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>

}


// ── Main app view ─────────────────────────────────────────────────────────────

function Storybook({ tweaks, lang, onLangChange }) {
  const palette = PALETTES[tweaks.tint] || PALETTES.cream;
  const drama   = DRAMA[tweaks.drama]   || DRAMA.playful;
  const titleFont = TITLE_FONTS[tweaks.titleFont] || TITLE_FONTS.bagel;
  const iconStyle = tweaks.iconStyle;
  const s = STRINGS[lang];

  const [cat, setCat] = React.useState('walk');
  const [activity, setActivity] = React.useState(null);
  const [spinning, setSpinning] = React.useState(false);
  const [history, setHistory] = React.useState([]);
  const [seedKey, setSeedKey] = React.useState(0);
  const dayNum = React.useMemo(() => getDayOnLeave(), []);

  const cats = ['walk', 'play', 'puzzle', 'read'];
  const rotations = React.useMemo(() => ({
    walk: -drama.chip, play: drama.chip * 0.65, puzzle: -drama.chip * 0.7, read: drama.chip,
  }), [drama.chip]);

  const C = CAT_COLORS[cat];
  const cardRotation = drama.card;

  const switchLang = (newLang) => {
    onLangChange(newLang);
    setActivity(null);
    setHistory([]);
  };

  const pick = () => {
    setSpinning(true);
    setTimeout(() => {
      const pool = ACTIVITIES[lang][cat].activities;
      let next, attempts = 0;
      do {
        next = pool[Math.floor(Math.random() * pool.length)];
        attempts++;
      } while (activity && next.title === activity.title && pool.length > 1 && attempts < 5);
      setActivity(next);
      setSeedKey((k) => k + 1);
      setHistory((h) => {
        const trimmed = h.filter((x) => x.title !== next.title);
        return [{ cat, ...next }, ...trimmed].slice(0, 4);
      });
      setSpinning(false);
    }, 320);
  };

  const recall = (item) => {
    setCat(item.cat);
    setActivity({ title: item.title, description: item.description, duration: item.duration });
    setSeedKey((k) => k + 1);
  };

  const openTweaks = () => {
    window.dispatchEvent(new MessageEvent('message', { data: { type: '__activate_edit_mode' } }));
  };

  return (
    <div style={{
      width: '100%', minHeight: '100vh',
      background: palette.paper,
      backgroundImage: `radial-gradient(circle at 10% 6%, ${palette.accent}26, transparent 38%), radial-gradient(circle at 92% 96%, ${C.tape}38, transparent 42%)`,
      fontFamily: '"Nunito", system-ui, sans-serif',
      color: palette.ink,
      padding: 'max(env(safe-area-inset-top, 0px) + 24px, 36px) 22px max(env(safe-area-inset-bottom, 0px) + 32px, 40px)',
      boxSizing: 'border-box',
      position: 'relative',
      overflow: 'hidden',
      transition: 'background 0.45s ease',
    }}>
      {/* paper grain */}
      <div style={{
        position: 'absolute', inset: 0, opacity: 0.35, pointerEvents: 'none',
        backgroundImage: 'radial-gradient(rgba(0,0,0,0.05) 1px, transparent 1px)',
        backgroundSize: '4px 4px',
      }}/>

      {/* top row */}
      <div style={{
        display: 'flex', alignItems: 'center',
        marginBottom: 14, position: 'relative', zIndex: 1, gap: 8,
      }}>
        <span style={{
          fontFamily: '"Caveat", cursive', fontSize: 19, color: palette.muted,
          transform: 'rotate(-1deg)', transformOrigin: 'left',
          whiteSpace: 'nowrap', flex: 1,
        }}>{s.dayLeave(dayNum)}</span>


        <LangSwitcher lang={lang} palette={palette} onChange={switchLang}/>

        <button onClick={openTweaks} title={s.tweaksTitle} style={{
          background: 'none', border: 'none', padding: 4,
          opacity: 0.45, fontSize: 18, lineHeight: 1,
          transform: 'rotate(2deg)', transition: 'opacity .15s', flexShrink: 0,
        }} onMouseEnter={(e) => e.currentTarget.style.opacity = 0.8}
           onMouseLeave={(e) => e.currentTarget.style.opacity = 0.45}>⚙</button>
      </div>

      {/* headline */}
      <div style={{ position: 'relative', marginBottom: 6 }}>
        <div style={{
          fontFamily: '"Caveat", cursive',
          fontSize: 22, color: palette.muted, lineHeight: 1.1, marginBottom: 6,
          transform: 'rotate(-1.5deg)', transformOrigin: 'left',
          display: 'inline-block', whiteSpace: 'nowrap',
        }}>{s.subtitle}</div>
        <h1 style={{
          fontFamily: titleFont.family, fontWeight: titleFont.weight,
          fontSize: titleFont.sizeHero, lineHeight: 0.95,
          color: palette.ink, letterSpacing: -0.5,
          margin: 0, marginBottom: 6,
        }}>{s.headline[0]}<br/>{s.headline[1]}</h1>
        <div style={{ position: 'absolute', top: 16, right: -4 }}>
          <Squiggle color={palette.accent}/>
        </div>
      </div>

      {/* category sticker chips */}
      <div style={{
        display: 'flex', flexWrap: 'wrap', gap: 10,
        marginTop: 22, marginBottom: 22, position: 'relative', zIndex: 1,
      }}>
        {cats.map((c) => {
          const active = c === cat;
          const cc = CAT_COLORS[c];
          return (
            <button key={c} onClick={() => { setCat(c); setActivity(null); }}
              style={{
                display: 'flex', alignItems: 'center', gap: 8,
                padding: '9px 14px 9px 11px',
                background: active ? cc.bg : '#FFFCF4',
                border: `2.5px solid ${active ? cc.ink : palette.ink}`,
                borderRadius: 999,
                fontFamily: '"Nunito"', fontWeight: 800, fontSize: 14,
                color: active ? cc.ink : palette.ink,
                transform: `rotate(${rotations[c]}deg) ${active ? 'scale(1.05)' : 'scale(1)'}`,
                boxShadow: active
                  ? `${drama.shadow}px ${drama.shadow}px 0 ${cc.ink}`
                  : `2px 2px 0 ${palette.ink}`,
                transition: 'transform .18s, box-shadow .18s, background .18s, border-color .18s',
              }}>
              <Icon cat={c} style={iconStyle} size={22} lang={lang}/>
              {ACTIVITIES[lang][c].label}
            </button>
          );
        })}
      </div>

      {/* generate button */}
      <button onClick={pick} disabled={spinning} style={{
        width: '100%', padding: '17px 16px',
        background: palette.ink, color: palette.paper,
        border: 'none', borderRadius: 18,
        fontFamily: titleFont.family, fontWeight: titleFont.weight,
        fontSize: 22, letterSpacing: 0.3,
        cursor: spinning ? 'wait' : 'pointer',
        boxShadow: `${drama.shadow + 1}px ${drama.shadow + 1}px 0 ${palette.accent}`,
        transition: 'transform .12s, box-shadow .12s',
        transform: spinning ? `translate(${drama.shadow / 2}px,${drama.shadow / 2}px)` : 'none',
        marginBottom: 22,
        display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 10,
        position: 'relative', zIndex: 1,
      }}>
        <span>{spinning ? s.thinking : (activity ? s.rollAgain : s.pickAdventure)}</span>
        <span style={{
          display: 'inline-block',
          transition: 'transform .35s',
          transform: spinning ? 'rotate(720deg)' : 'rotate(0)',
          fontSize: 18,
        }}>✦</span>
      </button>

      {/* activity card or empty state */}
      <div style={{ position: 'relative', zIndex: 1 }}>
        {activity ? (
          <ActivityCard
            cat={cat} item={activity} seedKey={seedKey}
            palette={palette} C={C}
            rotation={cardRotation} drama={drama}
            titleFont={titleFont} iconStyle={iconStyle}
            lang={lang}
          />
        ) : (
          <EmptyState palette={palette} C={C} cat={cat} iconStyle={iconStyle} lang={lang}/>
        )}
      </div>

      {/* history strip */}
      {history.length > 0 && (
        <div style={{ marginTop: 28, position: 'relative', zIndex: 1 }}>
          <div style={{
            fontFamily: '"Caveat", cursive', fontSize: 18,
            color: palette.muted, marginBottom: 8,
            transform: 'rotate(-1deg)', transformOrigin: 'left', display: 'inline-block',
          }}>{s.recentlyRolled}</div>
          <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
            {history.map((h, i) => {
              const hc = CAT_COLORS[h.cat];
              return (
                <button key={h.title + i} onClick={() => recall(h)} title={h.title}
                  style={{
                    display: 'inline-flex', alignItems: 'center', gap: 6,
                    padding: '5px 10px 5px 8px',
                    background: '#FFFCF4', border: `1.5px solid ${palette.ink}`,
                    borderRadius: 999,
                    fontFamily: '"Nunito"', fontWeight: 700, fontSize: 12,
                    color: palette.ink,
                    boxShadow: `1.5px 1.5px 0 ${hc.tape}`,
                    maxWidth: 200, overflow: 'hidden',
                    whiteSpace: 'nowrap', textOverflow: 'ellipsis',
                  }}>
                  <Icon cat={h.cat} style={iconStyle} size={14} lang={lang}/>
                  <span style={{ overflow: 'hidden', textOverflow: 'ellipsis' }}>{h.title}</span>
                </button>
              );
            })}
          </div>
        </div>
      )}

      <style>{`
        @keyframes sbFlop {
          0%   { transform: rotate(${cardRotation + 3}deg) translateY(24px) scale(0.94); }
          55%  { transform: rotate(${cardRotation - 1.5}deg) translateY(-3px) scale(${1 + (drama.bounce - 1) * 0.05}); }
          100% { transform: rotate(${cardRotation}deg) translateY(0) scale(1); }
        }
      `}</style>
    </div>
  );
}


// ── App ───────────────────────────────────────────────────────────────────────

const TWEAK_DEFAULTS = { iconStyle: 'emoji', tint: 'cream', drama: 'playful', titleFont: 'bagel' };

function getLang() {
  try { return localStorage.getItem('dad-app-lang') || 'no'; } catch { return 'no'; }
}
function saveLang(l) {
  try { localStorage.setItem('dad-app-lang', l); } catch {}
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [lang, setLangState] = React.useState(getLang);
  const s = STRINGS[lang];

  const setLang = (l) => { setLangState(l); saveLang(l); };

  return (
    <React.Fragment>
      <Storybook tweaks={t} lang={lang} onLangChange={setLang}/>
      <TweaksPanel title={s.tweaksTitle}>
        <TweakSection label={s.tweakLook}>
          <TweakRadio label={s.tweakPaperTint} value={t.tint} options={s.tints}
            onChange={(v) => setTweak('tint', v)}/>
          <TweakRadio label={s.tweakTitleFont} value={t.titleFont} options={s.fonts}
            onChange={(v) => setTweak('titleFont', v)}/>
        </TweakSection>
        <TweakSection label={s.tweakFeel}>
          <TweakRadio label={s.tweakDrama} value={t.drama} options={s.dramas}
            onChange={(v) => setTweak('drama', v)}/>
          <TweakRadio label={s.tweakIcons} value={t.iconStyle} options={s.icons}
            onChange={(v) => setTweak('iconStyle', v)}/>
        </TweakSection>
      </TweaksPanel>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
